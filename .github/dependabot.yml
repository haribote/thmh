version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: chore(ci)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    versioning-strategy: increase
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
    cooldown:
      default-days: 7
    ignore:
      # @types/node の major は Node のランタイムに合わせて人手で上げる
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
